name: Ingest MPD player ID map

on:
  schedule:
    # Sunday 10:00 UTC (~6:00 AM US Eastern during EDT; ~5:00 AM during EST).
    - cron: "0 10 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ingest-mpd-player-map
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GHA_MPD_INGEST_ROLE_ARN }}
          aws-region: us-east-1

      - name: Download and upload MPD player ID map
        run: python utils/ingest/mpd_player_map.py
