version: 2

sources:
  - name: ftn
    database: AwsDataCatalog
    schema: ftn
    tables:
      # Freshness skipped: preseason snapshot; no scheduled ingest.
      - name: projections_preseason
        tags: [preseason]
        external:
          location: s3://dn-lakehouse-dev/ftn/projections/preseason/hitting_and_pitching/
      - name: faab
        tags: [inseason]
        external:
          location: s3://dn-lakehouse-dev/ftn/faab/
        config:
          loaded_at_query: "{{ source_partition_max_loaded_at('ftn', 'faab') }}"
          freshness:
            warn_after: {count: 8, period: day}
            error_after: {count: 10, period: day}
