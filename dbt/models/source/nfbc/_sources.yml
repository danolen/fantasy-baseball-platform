version: 2

sources:
  - name: nfbc
    database: AwsDataCatalog
    schema: nfbc
    tables:
      # Freshness skipped: standings Prefect flow (#44) not deployed yet.
      - name: standings
        tags: [preseason]
        external:
          location: s3://dn-lakehouse-dev/nfbc/standings/
      # Freshness skipped: manual preseason export.
      - name: players
        tags: [preseason]
        external:
          location: s3://dn-lakehouse-dev/nfbc/players/
      # Freshness skipped: daily ADP GHA workflow (#41) not deployed yet.
      - name: adp
        tags: [preseason]
        external:
          location: s3://dn-lakehouse-dev/nfbc/adp/
      - name: in_season_players
        tags: [inseason]
        external:
          location: s3://dn-lakehouse-dev/nfbc/in-season-players/
        config:
          loaded_at_query: "{{ source_partition_max_loaded_at('nfbc', 'in_season_players') }}"
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 36, period: hour}
      # Freshness: NFBC in-season Prefect flow (#44/#119). Glue tables are
      # unpartitioned; dbt derives year/month/day from Athena "$path" (#182).
      - name: in_season_overall_overview
        tags: [inseason]
        external:
          location: s3://dn-lakehouse-dev/nfbc/in-season-standings/overall/overview/
        config:
          loaded_at_query: "{{ source_partition_max_loaded_at('nfbc', 'in_season_overall_overview') }}"
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 36, period: hour}
      - name: in_season_overall_category_stats
        tags: [inseason]
        external:
          location: s3://dn-lakehouse-dev/nfbc/in-season-standings/overall/category-stats/
        config:
          loaded_at_query: "{{ source_partition_max_loaded_at('nfbc', 'in_season_overall_category_stats') }}"
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 36, period: hour}
      - name: in_season_overall_category_points
        tags: [inseason]
        external:
          location: s3://dn-lakehouse-dev/nfbc/in-season-standings/overall/category-points/
        config:
          loaded_at_query: "{{ source_partition_max_loaded_at('nfbc', 'in_season_overall_category_points') }}"
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 36, period: hour}
