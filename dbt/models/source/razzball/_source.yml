version: 2

sources:
  - name: razzball
    database: AwsDataCatalog
    schema: razzball
    tables:
      # Freshness skipped: preseason snapshot; no scheduled ingest.
      - name: projections_preseason_hitting
        tags: [preseason]
        external:
          location: s3://dn-lakehouse-dev/razzball/projections/preseason/hitting/
      # Freshness skipped: preseason snapshot; no scheduled ingest.
      - name: projections_preseason_pitching
        tags: [preseason]
        external:
          location: s3://dn-lakehouse-dev/razzball/projections/preseason/pitching/
      # Freshness: Razzball weekly Prefect flow (#47).
      - name: projections_weekly_hitting
        tags: [inseason]
        external:
          location: s3://dn-lakehouse-dev/razzball/projections/weekly/hitting/
        config:
          loaded_at_query: "{{ source_partition_max_loaded_at('razzball', 'projections_weekly_hitting') }}"
          freshness:
            warn_after: {count: 5, period: day}
            error_after: {count: 7, period: day}
      # Freshness: Razzball weekly Prefect flow (#47).
      - name: projections_weekly_pitching
        tags: [inseason]
        external:
          location: s3://dn-lakehouse-dev/razzball/projections/weekly/pitching/
        config:
          loaded_at_query: "{{ source_partition_max_loaded_at('razzball', 'projections_weekly_pitching') }}"
          freshness:
            warn_after: {count: 5, period: day}
            error_after: {count: 7, period: day}
      # Freshness: Razzball weekend Prefect flow (#47).
      - name: projections_weekly_weekend_hitting
        tags: [inseason]
        external:
          location: s3://dn-lakehouse-dev/razzball/projections/weekly/weekend_hitting/
        config:
          loaded_at_query: "{{ source_partition_max_loaded_at('razzball', 'projections_weekly_weekend_hitting') }}"
          freshness:
            warn_after: {count: 5, period: day}
            error_after: {count: 7, period: day}
