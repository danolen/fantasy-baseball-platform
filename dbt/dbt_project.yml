
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'lakehouse_aws'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'default'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In dbt, the default materialization for a model is a view. This means, when you run 
# dbt run or dbt build, all of your models will be built as a view in your data platform. 
# The configuration below will override this setting for models in the example folder to 
# instead be materialized as tables. Any models you add to the root of the models folder will 
# continue to be built as views. These settings can be overridden in the individual model files
# using the `{{ config(...) }}` macro.

models:
  lakehouse_aws:
    source:
      +schema: source
      +table_type: iceberg
      +format: parquet
    stage:
      +schema: stage
      +table_type: iceberg
      +format: parquet
    main:
      +schema: main
      +table_type: iceberg
      +format: parquet
      # Selectors: use `dbt build --select +tag:<name>` so upstream refs build too.
      # `inseason` — Streamlit in-season tool (single tag for the whole slice for now).
      mart_faab_worksheet:
        +tags: [inseason]
      mart_faab_unmatched:
        +tags: [inseason]
      mart_weekly_lineup_inputs:
        +tags: [inseason]
      mart_weekly_projections:
        +tags: [inseason]
      # `preseason` — draft tool rankings + SGP percentiles mart.
      mart_preseason_overall_rankings_me:
        +tags: [preseason]
      mart_preseason_overall_rankings_oc:
        +tags: [preseason]
      mart_preseason_overall_rankings_50s:
        +tags: [preseason]
      mart_sgp_percentiles:
        +tags: [preseason]
      # `on_demand` — ROS ranking marts (heavier; not required for draft UI today).
      mart_rest_of_season_overall_rankings_me:
        +tags: [on_demand]
      mart_rest_of_season_overall_rankings_oc:
        +tags: [on_demand]
      mart_rest_of_season_overall_rankings_50s:
        +tags: [on_demand]
