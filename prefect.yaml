# Prefect deployment config (ticket #43, Option A in docs/adr/0001-prefect-on-aws.md).
#
# Target: Prefect Cloud Hobby (free) + a Prefect Managed (serverless) work pool.
# No AWS infra, no Docker image, no ECR. Prefect clones this repo, installs the
# pip_packages below, and runs the flow on Prefect-managed compute.
#
# One-time setup is documented in flows/README.md. Then deploy + run with:
#   prefect deploy --name hello-managed
#   prefect deployment run "hello-world/hello-managed"

name: fbb-flows
prefect-version: ">=3.0,<4.0"

# How Prefect Managed fetches the code at run time.
pull:
  - prefect.deployments.steps.git_clone:
      repository: https://github.com/danolen/fantasy-baseball-platform.git
      branch: master

deployments:
  - name: hello-managed
    entrypoint: flows/hello_flow.py:hello_world
    # The flow loads this Prefect AwsCredentials block to write to S3 (Managed
    # compute has no ambient AWS creds). Create it once — see flows/README.md.
    parameters:
      aws_credentials_block: fbb-aws
    work_pool:
      name: managed-pool
      job_variables:
        pip_packages:
          - prefect-aws>=0.5
          - boto3>=1.34
    # No schedule: hello-world is triggered manually to conserve the 500
    # free serverless minutes/month.

  - name: nfbc-in-season-managed
    entrypoint: flows/nfbc_in_season.py:nfbc_in_season
    description: >-
      NFBC in-season players download (#44). Daily at 8 AM ET.
      dbt Cloud trigger deferred until a production job exists.
    parameters:
      aws_credentials_block: fbb-aws
    schedules:
      - cron: "0 8 * * *"
        timezone: America/New_York
    work_pool:
      name: managed-pool
      job_variables:
        pip_packages:
          - prefect-aws>=0.5
          - boto3>=1.34
          - requests>=2.31
          - curl_cffi>=0.7

  - name: fangraphs-ros-managed
    entrypoint: flows/fangraphs_ros.py:fangraphs_ros
    description: >-
      FanGraphs rest-of-season projections download (#45). Daily at 8 AM ET.
      dbt Cloud trigger deferred until a production job exists.
    parameters:
      aws_credentials_block: fbb-aws
    schedules:
      - cron: "0 8 * * *"
        timezone: America/New_York
    work_pool:
      name: managed-pool
      job_variables:
        pip_packages:
          - prefect-aws>=0.5
          - boto3>=1.34
          - requests>=2.31
          - curl_cffi>=0.7

  - name: ftn-faab-managed
    entrypoint: flows/ftn_faab.py:ftn_faab
    description: >-
      FTN FAAB recommendations download (#46). Daily at 8 AM ET.
      Projections deferred to #122. dbt Cloud trigger deferred.
    parameters:
      aws_credentials_block: fbb-aws
    schedules:
      - cron: "0 8 * * *"
        timezone: America/New_York
    work_pool:
      name: managed-pool
      job_variables:
        pip_packages:
          - prefect-aws>=0.5
          - boto3>=1.34
          - requests>=2.31
          - curl_cffi>=0.7
